server:
  port: 8084

spring:
  application:
    name: order
  datasource:
    url: jdbc:postgresql://localhost:5432/orderdb
    username: postgres
    password: postgres
    jpa:
      hibernate:
      ddl-auto: none   # we already created tables in pgAdmin
      show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka